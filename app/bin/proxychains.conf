# proxychains-ng 配置文件（v1.11.0+）
# 通过 with-proxy 命令注入到进程，自动走 xray SOCKS5
# 重要：本文件不要动 /etc，停在 fpk 自己的目录

# 走代理的方式：dynamic_chain（自动跳过不可用代理）还是 strict_chain（按顺序）
dynamic_chain

# 解析 DNS 还是在远程代理（防 DNS 污染）
proxy_dns

# 超时时间（毫秒）
tcp_connect_time_out 8000
tcp_read_time_out 15000

# 本地流量不走代理（避免回环）
localnet 127.0.0.0/255.0.0.0
localnet 10.0.0.0/255.0.0.0
localnet 172.16.0.0/255.240.0.0
localnet 192.168.0.0/255.255.0.0

# 远程代理：xray SOCKS5（仅本机回环）
[ProxyList]
socks5  127.0.0.1 10808
